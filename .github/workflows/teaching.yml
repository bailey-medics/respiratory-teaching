# Teaching CI/CD — single entry point.
#
# Triggers on all relevant events and delegates to the teaching-tooling
# pipeline, which dispatches to the correct job based on event type.
name: Teaching CI

on:
  push:
    branches:
      - "feature/**"
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  pipeline:
    uses: bailey-medics/teaching-tooling/.github/workflows/pipeline.yml@main
    with:
      org_id: respiratory
    secrets: inherit
